<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Lead - CRM Automotivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-3xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <div>
        <h1 class="text-xl font-bold tracking-tight">Editar Lead</h1>
        <p class="text-sm text-slate-500">Atualize os dados do cliente</p>
      </div>

      <a href="{{ url_for('index') }}" class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
        Voltar
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-6 sm:px-6">
    <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
      {% if erro %}
        <div class="mb-5 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700">
          {{ erro }}
        </div>
      {% endif %}

      <form action="{{ url_for('editar_lead', lead_id=lead.id) }}" method="post" class="grid gap-5">
        <div>
          <label for="nome" class="mb-1.5 block text-sm font-semibold text-slate-700">Nome do cliente</label>
          <input id="nome" name="nome" type="text" value="{{ lead.nome }}" required class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10">
        </div>

        <div>
          <label for="telefone" class="mb-1.5 block text-sm font-semibold text-slate-700">Telefone / WhatsApp</label>
          <input id="telefone" name="telefone" type="tel" value="{{ lead.telefone }}" required class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10">
        </div>

        <div class="grid gap-5 sm:grid-cols-2">
          <div>
            <label for="origem" class="mb-1.5 block text-sm font-semibold text-slate-700">Origem</label>
            <select id="origem" name="origem" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10">
              {% for origem in ["Manual", "Webmotors", "Mercado Livre", "Instagram", "Indicação"] %}
                <option value="{{ origem }}" {% if lead.origem == origem %}selected{% endif %}>{{ origem }}</option>
              {% endfor %}
            </select>
          </div>

          <div>
            <label for="status_funil" class="mb-1.5 block text-sm font-semibold text-slate-700">Status no funil</label>
            <select id="status_funil" name="status_funil" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10">
              {% for status in ["Novo", "Em Atendimento", "Visita Agendada", "Concluído / Venda"] %}
                <option value="{{ status }}" {% if lead.status_funil == status %}selected{% endif %}>{{ status }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div>
          <label for="veiculo_interesse" class="mb-1.5 block text-sm font-semibold text-slate-700">Veículo de interesse</label>
          <input id="veiculo_interesse" name="veiculo_interesse" type="text" value="{{ lead.veiculo.modelo if lead.veiculo else lead.veiculo_interesse or '' }}" placeholder="Modelo, placa ou ID de veículo cadastrado" class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10">
          <p class="mt-1 text-xs text-slate-500">Para vincular, informe um modelo, placa ou ID que já exista no cadastro de veículos.</p>
        </div>

        <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-5 sm:flex-row sm:justify-end">
          <a href="{{ url_for('index') }}" class="inline-flex justify-center rounded-md border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
            Cancelar
          </a>
          <button type="submit" class="inline-flex justify-center rounded-md bg-green-600 px-4 py-2.5 text-sm font-bold text-white shadow-sm transition hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-600 focus:ring-offset-2">
            Salvar Alterações
          </button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
