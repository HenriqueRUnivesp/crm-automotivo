<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - CRM Automotivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
      <div class="mb-6">
        <h1 class="text-2xl font-bold tracking-tight">CRM Automotivo</h1>
        <p class="mt-1 text-sm text-slate-500">Acesse o painel de leads</p>
      </div>

      {% if erro %}
        <div class="mb-4 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700">
          {{ erro }}
        </div>
      {% endif %}

      <form action="{{ url_for('login') }}" method="post" class="space-y-4">
        <div>
          <label for="usuario" class="mb-1.5 block text-sm font-semibold text-slate-700">Usuário</label>
          <input
            id="usuario"
            name="usuario"
            type="text"
            autocomplete="username"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10"
          >
        </div>

        <div>
          <label for="senha" class="mb-1.5 block text-sm font-semibold text-slate-700">Senha</label>
          <input
            id="senha"
            name="senha"
            type="password"
            autocomplete="current-password"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-900/10"
          >
        </div>

        <button
          type="submit"
          class="w-full rounded-md bg-slate-900 px-4 py-2.5 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
        >
          Entrar
        </button>
      </form>
    </section>
  </main>
</body>
</html>
